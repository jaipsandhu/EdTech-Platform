<div class="student-dashboard">

  <nav class="navbar">

    <div class="brand">
      EdTech
    </div>

    <div class="nav-menu">

      <button class="nav-item active">
        Learning
      </button>

      <button class="nav-item">
        Courses
      </button>

      <button class="nav-item">
        Notes
      </button>

      <button class="nav-item">
        AI Assistant
      </button>

    </div>

    <button class="contact-btn">
      Student
    </button>

  </nav>

  <section class="dashboard-header">

    <div class="dashboard-left">

      <input
        type="text"
        class="search-input"
        placeholder="Search content..."
        [(ngModel)]="searchTerm"
        (input)="filterContents()">

    </div>

    <div class="dashboard-right">

      <div class="stats-card">

        <span>
          Available Content
        </span>

        <h3>
          {{ contents.length }}
        </h3>

      </div>

    </div>

  </section>

  <div class="dashboard-layout">

    <section class="content-section">

      <div
        *ngIf="!loading"
        class="content-list">

        <div
          class="content-card"
          *ngFor="
            let content of filteredContents;
            trackBy: trackById
          ">

          <div>

            <span class="content-type">
              {{ content.contentType }}
            </span>

            <h3>
              {{ content.title }}
            </h3>

            <p>
              Uploaded by {{ content.uploadedBy || 'Faculty' }}
            </p>

          </div>

          <div class="card-actions">

            <button
              class="secondary-btn"
              (click)="openNotes(content)">

              Notes

            </button>

            <button
              class="primary-btn"
              (click)="viewContent(content)">

              Open

            </button>

          </div>

        </div>

      </div>

    </section>

    <aside class="chat-panel">

      <div class="chat-header">

        <span class="section-tag">
          AI Assistant
        </span>

        <h3>
          Ask Anything
        </h3>

      </div>

      <div
        #chatContainer
        class="chat-messages">

        <div
          *ngFor="let msg of messages"
          class="message"
          [class.user]="msg.isUser">

          {{ msg.text }}

        </div>

      </div>

      <div class="chat-input">

        <input
          type="text"
          [(ngModel)]="chatInput"
          (keyup.enter)="sendMessage()"
          placeholder="Ask a question...">

        <button
          (click)="sendMessage()">

          Send

        </button>

      </div>

    </aside>

  </div>

  <div
    *ngIf="showNotesModal"
    class="modal"
    (click)="closeNotesModal()">

    <div
      class="modal-card"
      (click)="$event.stopPropagation()">

      <span class="section-tag">
        Notes
      </span>

      <h2>
        {{ selectedContent?.title }}
      </h2>

      <input
        type="text"
        placeholder="Note Title"
        [(ngModel)]="newNoteTitle">

      <textarea
        rows="5"
        placeholder="Write your notes..."
        [(ngModel)]="newNoteContent">
      </textarea>

      <button
        class="primary-btn"
        (click)="saveNote()">

        Save Note

      </button>

      <div
        class="note-card"
        *ngFor="let note of notes">

        <h4>
          {{ note.title }}
        </h4>

        <p>
          {{ note.content }}
        </p>

        <button
          class="delete-btn"
          (click)="deleteNote(note.id)">

          Delete

        </button>

      </div>

    </div>

  </div>

</div>
