<div class="teacher-dashboard">

  <nav class="navbar">

    <div class="brand">
      EdTech
    </div>

    <div class="nav-menu">

      <button class="nav-item active">
        Dashboard
      </button>

      <button class="nav-item">
        Courses
      </button>

      <button class="nav-item">
        Uploads
      </button>

      <button class="nav-item">
        Analytics
      </button>

    </div>

    <button class="contact-btn">
      Teacher
    </button>

    <button
      class="logout-btn"
      (click)="logout()">

      Logout

    </button>

  </nav>

  <section class="management-header">

    <div class="header-left">
      <h1>Teacher Content</h1>
    </div>

    <div class="header-right">

      <input
        type="text"
        class="search-input"
        placeholder="Search content..."
        [(ngModel)]="searchTerm"
        (input)="filterContent()">

      <div class="content-count">
        <span>Total Content</span>
        <h3>{{ filteredContents.length }}</h3>
      </div>

      <button
        class="upload-btn"
        (click)="openUploadModal()">

        Upload Content

      </button>

    </div>

  </section>

  <section
    *ngIf="!loading"
    class="content-table">

    <div class="table-header">

      <span>Content Library</span>

      <span>
        {{ filteredContents.length }}
        Records
      </span>

    </div>

    <div
      class="content-row"
      *ngFor="
      let content of filteredContents;
      trackBy: trackById">

      <div class="content-info">

        <h3>{{ content.title }}</h3>

        <span>
          Uploaded by {{ content.uploadedBy }}
        </span>

      </div>

      <div class="role">
        {{ content.contentType }}
      </div>

      <div class="status">

        <span
          *ngIf="content.active"
          class="active-status">

          ACTIVE

        </span>

        <span *ngIf="!content.active">

          INACTIVE

        </span>

      </div>

      <div class="actions">

        <button
          class="edit-btn"
          (click)="viewContent(content.fileUrl)">

          View

        </button>

        <button
          *ngIf="!content.active"
          class="edit-btn"
          (click)="activateContent(content.id)">

          Activate

        </button>

        <button
          *ngIf="content.active"
          class="edit-btn"
          (click)="deactivateContent(content.id)">

          Deactivate

        </button>

        <button
          class="delete-btn"
          (click)="deleteContent(content.id)">

          Delete

        </button>

      </div>

    </div>

  </section>

  <div
    *ngIf="loading"
    class="loading">

    Loading Content...

  </div>

  <div
    *ngIf="showUploadModal"
    class="modal-overlay">

    <div class="edit-modal">

      <h2>Upload Content</h2>

      <div class="form-group">

        <label>Title</label>

        <input
          type="text"
          [(ngModel)]="uploadTitle">

      </div>

      <div class="form-group">

        <label>Subject</label>

        <input
          type="text"
          [(ngModel)]="uploadSubject">

      </div>

      <div class="form-group">

        <label>Description</label>

        <textarea
          rows="4"
          [(ngModel)]="uploadDescription">
        </textarea>

      </div>

      <div class="form-group">

        <label>Content Type</label>

        <select
          [(ngModel)]="uploadContentType">

          <option value="PDF">PDF</option>
          <option value="VIDEO">VIDEO</option>
          <option value="IMAGE">IMAGE</option>

        </select>

      </div>

      <div class="form-group">

        <input
          type="file"
          (change)="onFileSelected($event)">

      </div>

      <div class="modal-actions">

        <button
          class="cancel-btn"
          (click)="closeUploadModal()">

          Cancel

        </button>

        <button
          class="save-btn"
          (click)="uploadContent()">

          Upload

        </button>

      </div>

    </div>

  </div>

</div>
