<div class="student-management">

  <nav class="navbar">

    <div class="brand">
      EdTech
    </div>

    <div class="nav-menu">

      <a
        routerLink="/admin"
        class="nav-item">
        Dashboard
      </a>

      <a
        routerLink="/admin/students"
        class="nav-item active">
        Students
      </a>

      <a
        routerLink="/admin/teachers"
        class="nav-item">
        Teachers
      </a>

      <a
        routerLink="/admin/content"
        class="nav-item">
        Content
      </a>

    </div>

    <div class="nav-actions">

      <button class="contact-btn">
        Admin
      </button>

    </div>

  </nav>

  <section class="management-header">

    <div class="header-left">

      <h1>
        Student Management
      </h1>

    </div>

    <div class="header-right">

      <input
        type="text"
        class="search-input"
        placeholder="Search student..."
        [(ngModel)]="searchTerm"
        (input)="filterStudents()">

      <div class="student-count">

        <span>Total Students</span>

        <h3>{{ students.length }}</h3>

      </div>

    </div>

  </section>

  <section
    *ngIf="!loading"
    class="student-table">

    <div class="table-header">

      <span>
        Student Directory
      </span>

      <span>
        {{ filteredStudents.length }} Records
      </span>

    </div>

    <div
      class="student-row"
      *ngFor="let student of filteredStudents; trackBy: trackById">

      <div>

        <h3>
          {{ student.email }}
        </h3>

        <span>
          Student ID #{{ student.id }}
        </span>

      </div>

      <div class="role">

        {{ student.role }}

      </div>

      <div class="actions">

        <button
          class="edit-btn"
          (click)="editStudent(student)">
          Edit
        </button>

        <button
          class="delete-btn"
          (click)="deleteStudent(student.id)">
          Delete
        </button>

      </div>

    </div>

  </section>

  <div
    *ngIf="loading"
    class="loading">

    Loading Students...

  </div>

  <div
    *ngIf="errorMessage"
    class="error">

    {{ errorMessage }}

  </div>

  <!-- EDIT MODAL -->

  <div class="modal-overlay" *ngIf="showEditModal">

    <div class="edit-modal">

      <h2>Edit Student</h2>

      <div class="form-group">
        <label>Email</label>

        <input
          type="email"
          [(ngModel)]="editEmail">
      </div>

      <div class="form-group">
        <label>Role</label>

        <select [(ngModel)]="editRole">

          <option value="STUDENT">
            STUDENT
          </option>

          <option value="TEACHER">
            TEACHER
          </option>

        </select>
      </div>

      <div class="modal-actions">

        <button
          class="cancel-btn"
          (click)="closeModal()">
          Cancel
        </button>

        <button
          class="save-btn"
          (click)="saveEdit()">
          Save Changes
        </button>

      </div>

    </div>

  </div>







</div>
