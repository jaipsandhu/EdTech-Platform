<div class="admin-dashboard">

  <nav class="navbar">

    <div class="brand">
      EdTech
    </div>

    <div class="nav-menu">

      <div class="admin-nav">

        <a
          routerLink="/admin"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-item">
          Dashboard
        </a>

        <a
          routerLink="/admin/students"
          routerLinkActive="active"
          class="nav-item">
          Students
        </a>

        <a
          routerLink="/admin/teachers"
          routerLinkActive="active"
          class="nav-item">
          Teachers
        </a>

        <a
          routerLink="/admin/content"
          routerLinkActive="active"
          class="nav-item">
          Content
        </a>

      </div>

    </div>

    <div class="nav-actions">

      <button class="contact-btn">
        Admin
      </button>

    </div>

  </nav>

  <section class="hero">

    <div class="hero-right">

      <div class="dashboard-window">

        <div class="window-header">

          <div class="window-brand">
            EdTech
          </div>

          <div class="window-title">
            Administrative Overview
          </div>

        </div>

        <div class="metrics-grid">

          <div
            class="metric-card"
            (click)="goToStudents()">

            <span>Students</span>

            <h3>1,248</h3>

          </div>

          <div
            class="metric-card"
            (click)="goToTeachers()">

            <span>Teachers</span>

            <h3>84</h3>

          </div>

          <div
            class="metric-card"
            (click)="goToContent()">

            <span>Content</span>

            <h3>432</h3>

          </div>

          <div class="metric-card">

            <span>Completion</span>

            <h3>96%</h3>

          </div>

        </div>

      </div>

      <div class="floating-stat">

        <span>Platform Health</span>

        <h4>98%</h4>

      </div>

    </div>

  </section>

</div>
