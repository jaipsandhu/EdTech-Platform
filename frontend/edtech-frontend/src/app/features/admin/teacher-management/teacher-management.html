<div class="teacher-management">

  <nav class="navbar">

    <div class="brand">
      EdTech
    </div>

    <div class="nav-menu">

      <a
        routerLink="/admin"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{exact:true}"
        class="nav-item">
        Dashboard
      </a>

      <a
        routerLink="/admin/students"
        routerLinkActive="active"
        class="nav-item">
        Students
      </a>

      <a
        routerLink="/admin/teachers"
        routerLinkActive="active"
        class="nav-item">
        Teachers
      </a>

      <a
        routerLink="/admin/content"
        routerLinkActive="active"
        class="nav-item">
        Content
      </a>

    </div>

    <div class="user-actions">

      <button class="contact-btn">
        Admin
      </button>

      <button
        class="logout-btn"
        (click)="logout()">

        Logout

      </button>
    </div>
  </nav>

  <section class="management-header">

    <div class="header-left">

      <h1>
        Teacher Management
      </h1>

    </div>

    <div class="header-right">

      <input
        type="text"
        class="search-input"
        placeholder="Search teacher..."
        [(ngModel)]="searchTerm"
        (input)="filterTeachers()">

      <div class="teacher-count">

        <span>Total Teachers</span>

        <h3>
          {{ filteredTeachers.length }}
        </h3>

      </div>

    </div>

  </section>

  <section
    *ngIf="!loading"
    class="teacher-table">

    <div class="table-header">

      <span>
        Faculty Directory
      </span>

      <span>
        {{ filteredTeachers.length }} Records
      </span>

    </div>

    <div
      class="teacher-row"
      *ngFor="let teacher of filteredTeachers; trackBy: trackById">

      <div>

        <h3>
          {{ teacher.email }}
        </h3>

        <span>
          Teacher ID #{{ teacher.id }}
        </span>

      </div>

      <div class="role">
        {{ teacher.role }}
      </div>

      <div class="actions">

        <button
          class="edit-btn"
          (click)="editTeacher(teacher)">
          Edit
        </button>

        <button
          class="delete-btn"
          (click)="deleteTeacher(teacher.id)">
          Delete
        </button>

      </div>

    </div>

  </section>

  <div
    *ngIf="loading"
    class="loading">

    Loading Teachers...

  </div>

  <div
    *ngIf="errorMessage"
    class="error">

    {{ errorMessage }}

  </div>

  <div
    *ngIf="showEditModal"
    class="modal-overlay"
    (click)="closeModal()">

    <div
      class="edit-modal"
      (click)="$event.stopPropagation()">

      <h2>Edit Teacher</h2>

      <div class="form-group">

        <label>Email</label>

        <input
          type="email"
          [(ngModel)]="editEmail">

      </div>

      <div class="form-group">

        <label>Role</label>

        <select [(ngModel)]="editRole">

          <option value="TEACHER">
            TEACHER
          </option>

          <option value="STUDENT">
            STUDENT
          </option>

        </select>

      </div>

      <div class="modal-actions">

        <button
          class="cancel-btn"
          (click)="closeModal()">

          Cancel

        </button>

        <button
          class="save-btn"
          (click)="saveEdit()">

          Save Changes

        </button>

      </div>

    </div>

  </div>

</div>
