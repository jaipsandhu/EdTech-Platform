<div class="auth-wrapper">
  <div class="signin-container">

    <div class="brand">
      <div class="brand-icon">🎓</div>
      <span class="brand-name">EdTech</span>
    </div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to continue your learning journey.</p>

    @if(errorMessage) {
      <div class="error-banner">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
      </div>
    }

    <form [formGroup]="signinForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label for="signin-email">EMAIL ADDRESS</label>
        <div class="input-wrap">
          <input
            id="signin-email"
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            autocomplete="email"
            [class.input-error]="isFieldInvalid('email')"
            [class.input-success]="isFieldValid('email')"
          >
        </div>
        @if(isFieldInvalid('email')) {
          <span class="field-error">{{ getFieldError('email') }}</span>
        }
      </div>

      <div class="field">
        <label for="signin-password">PASSWORD</label>
        <div class="input-wrap">
          <input
            id="signin-password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Minimum 6 characters"
            autocomplete="current-password"
            [class.input-error]="isFieldInvalid('password')"
            [class.input-success]="isFieldValid('password')"
          >
          <button type="button" class="toggle-pw" (click)="togglePassword()" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            @if(!showPassword) {
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            } @else {
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            }
          </button>
        </div>
        @if(isFieldInvalid('password')) {
          <span class="field-error">{{ getFieldError('password') }}</span>
        }
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        @if(isLoading) {
          <div class="spinner"></div>
          SIGNING IN...
        } @else {
          SIGN IN
        }
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/register">Create Account</a>
      <a routerLink="/forgot-password">Forgot Password?</a>
    </div>

  </div>
</div>
